name: Sync GitHub Issue to Jira

on:
  issues:
    types: [opened, edited, assigned] # Adicionado 'assigned'
  issue_comment:
    types: [created]

jobs:
  sync-to-jira:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Login to Jira
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      # BUSCA: Agora ele busca pelo número da issue no título, que é mais seguro
      - name: Find Existing Issue
        id: find
        uses: atlassian/gajira-find-issue-key@v3
        with:
          string: 'GH-${{ github.event.issue.number }}' 

      # CRIAÇÃO: Adiciona "GH-id" no título para facilitar buscas futuras
      - name: Create Issue in Jira
        if: github.event_name == 'issues' && github.event.action == 'opened' && steps.find.outputs.issue == ''
        uses: atlassian/gajira-create@v3
        with:
          project: 'HUBFUP' 
          issuetype: 'Task'
          summary: 'GH-${{ github.event.issue.number }}: ${{ github.event.issue.title }}'
          description: 'Link: ${{ github.event.issue.html_url }}\n\n${{ github.event.issue.body }}'

      # ATUALIZAÇÃO: Se encontrar o card, atualiza título e descrição
      - name: Update Jira Issue
        if: github.event_name == 'issues' && (github.event.action == 'edited' || github.event.action == 'assigned') && steps.find.outputs.issue != ''
        uses: atlassian/gajira-edit@v3
        with:
          issue: ${{ steps.find.outputs.issue }}
          summary: 'GH-${{ github.event.issue.number }}: ${{ github.event.issue.title }}'
          description: 'Link: ${{ github.event.issue.html_url }}\n\n${{ github.event.issue.body }}'

      # COMENTÁRIO
      - name: Add Comment to Jira
        if: github.event_name == 'issue_comment' && steps.find.outputs.issue != ''
        uses: atlassian/gajira-comment@v3
        with:
          issue: ${{ steps.find.outputs.issue }}
          comment: "${{ github.event.comment.user.login }} comentou: \n\n ${{ github.event.comment.body }}"
