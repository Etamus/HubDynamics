name: Sync GitHub Issue to Jira

on:
  issues:
    types: [opened, edited, labeled, unlabeled, closed, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch: # Permite que você rode o teste manualmente

jobs:
  sync-to-jira:
    runs-on: ubuntu-latest
    steps:
      - name: Teste de Gatilho
        run: echo "O robô acordou para a issue ${{ github.event.issue.number }}"

      - name: Login to Jira
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: Find Jira Issue
        id: find
        uses: atlassian/gajira-find-issue-key@v3
        with:
          string: 'GH-${{ github.event.issue.number }}'
        continue-on-error: true

      - name: Transition Issue
        if: github.event.action == 'labeled' && steps.find.outputs.issue != ''
        uses: atlassian/gajira-transition@v3
        with:
          issue: ${{ steps.find.outputs.issue }}
          # Use o nome EXATO que aparece no seu print do Jira (Case Sensitive)
          transition: ${{ (github.event.label.name == 'in-progress' && 'EM ANDAMENTO') || (github.event.label.name == 'in-validation' && 'IN VALIDATION') || (github.event.label.name == 'done' && 'CONCLUÍDO') }}
